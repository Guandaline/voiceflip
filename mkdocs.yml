site_name: Citation Guardrail Engine
site_description: A highly deterministic, observable RAG post-processing microservice.
site_author: VoiceFlip Candidate

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture:
    - Planning: planing.md
    - Checklist: checklist.md
  - Decision Records (ADRs):
    - ADR-000 Sample: adrs/ADR-000-sample-doc.md
    - ADR-001 Clean Architecture: adrs/ADR-001-pragmatic-clean-architecture.md
    - ADR-002 Hybrid Matching: adrs/ADR-002-hybrid-matching-strategy.md
    - ADR-003 Graceful Degradation: adrs/ADR-003-graceful-degradation-embedding.md
  - Reference:
    - Technical Test: TECHNICAL_TEST_CITATION_GUARDRAIL.md